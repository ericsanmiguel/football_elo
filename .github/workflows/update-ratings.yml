name: Update Elo Ratings

on:
  schedule:
    # Hourly through the 2026 World Cup. The export pulls finished matches
    # straight from ESPN (see espn_override.py), so a final lands on the site
    # within the hour instead of waiting for martj42's once-a-day update. Runs
    # with no new results are cheap no-ops (nothing to commit). Revert to
    # '0 0,6,12,18 * * *' after the final (2026-07-19).
    - cron: '0 * * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e .

      - name: Download data and export JSON
        run: python -m football_elo export-web

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update ratings data ($(date -u +%Y-%m-%d))"
            git push
          fi
